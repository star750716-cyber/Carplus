    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAnalytics, isSupported } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-analytics.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, collection, query, onSnapshot, addDoc, updateDoc, deleteDoc, setDoc, getDocs } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // 您的 Firebase Web 應用程式設定
        const firebaseConfig = {
            apiKey: "AIzaSyCsH9jC8A2pfN8WXHa32pMnHrVLvMXpV8U",
            authDomain: "leshine-car-calendar.firebaseapp.com",
            projectId: "leshine-car-calendar",
            storageBucket: "leshine-car-calendar.firebasestorage.app",
            messagingSenderId: "942204642588",
            appId: "1:942204642588:web:c013d4691a65f69587c6d9",
            measurementId: "G-L6XVB901EN"
        };

        // 初始化 Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // 安全初始化 Google Analytics
        isSupported().then((supported) => {
            if (supported) {
                const analytics = getAnalytics(app);
                window.firebaseAnalytics = analytics;
            }
        }).catch((err) => {
            console.warn("Analytics is not supported in this environment:", err);
        });

        window.firebaseInitialized = true;
        window.firebaseAuth = auth;
        window.firebaseDb = db;
        window.firebaseSDK = {
            signInAnonymously,
            signInWithCustomToken,
            onAuthStateChanged,
            doc,
            collection,
            query,
            onSnapshot,
            addDoc,
            updateDoc,
            deleteDoc,
            setDoc,
            getDocs
        };

        window.dispatchEvent(new Event('firebase-ready'));
    </script>
</head>
<body class="text-slate-800 antialiased min-h-screen flex flex-col">

    <div id="root" class="flex-grow flex flex-col"></div>

    <!-- React App logic with Babel -->
    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const DEFAULT_SALESMEN = [
            "鄭創澤", "彭詩皓", "姚紫瑩", "張珮羽", "周國煌", "吳元鑫", "鄭鈞淵", "郭秉傑"
        ];

        const CATEGORY_COLORS = {
            "通路拜訪": { bg: "bg-emerald-50 text-emerald-700 border-emerald-200", dot: "bg-emerald-500", border: "border-emerald-200", leftBar: "border-l-4 border-l-emerald-500", icon: "🏢" },
            "客戶開發": { bg: "bg-sky-50 text-sky-700 border-sky-200", dot: "bg-sky-500", border: "border-sky-200", leftBar: "border-l-4 border-l-sky-500", icon: "🤝" },
            "報價紀錄": { bg: "bg-amber-50 text-amber-700 border-amber-200", dot: "bg-amber-500", border: "border-amber-200", leftBar: "border-l-4 border-l-amber-500", icon: "📄" },
            "領牌": { bg: "bg-indigo-50 text-indigo-700 border-indigo-200", dot: "bg-indigo-500", border: "border-indigo-200", leftBar: "border-l-4 border-l-indigo-500", icon: "🚗" },
            "交車": { bg: "bg-rose-50 text-rose-700 border-rose-200", dot: "bg-rose-500", border: "border-rose-200", leftBar: "border-l-4 border-l-rose-500", icon: "🔑" },
            "客戶服務": { bg: "bg-purple-50 text-purple-700 border-purple-200", dot: "bg-purple-500", border: "border-purple-200", leftBar: "border-l-4 border-l-purple-500", icon: "🛠️" }
        };

        function App() {
            const [fbReady, setFbReady] = useState(false);
            const [user, setUser] = useState(null);
            
            // App Data State
            const [salesmenData, setSalesmenData] = useState([]); // Array of {id, name, password, createdAt}
            const [events, setEvents] = useState([]);
            const [monthlyTargets, setMonthlyTargets] = useState({}); // Stores target structures under key: `${salesman}_${year}_${month}`
            const [actualSales, setActualSales] = useState({}); // Stores sales transactions under key: `${salesman}_${year}_${month}`
            
            // Login Credentials State
            const [currentRole, setCurrentRole] = useState(null); // 'admin' | 'salesman' | null
            const [currentUser, setCurrentUser] = useState(null); // Name of current logged-in user
            const [loginUsername, setLoginUsername] = useState("");
            const [loginPassword, setLoginPassword] = useState("");
            
            // Interactive UI State
            const [selectedYear, setSelectedYear] = useState(2026);
            const [selectedMonth, setSelectedMonth] = useState(7); // default July 2026
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [isDeleteConfirmOpen, setIsDeleteConfirmOpen] = useState(false);
            const [selectedDate, setSelectedDate] = useState("2026-07-09"); // Default to 2026-07-09
            const [editingEvent, setEditingEvent] = useState(null);
            
            // Admin Dashboard Tabs
            const [adminTab, setAdminTab] = useState("calendar"); // 'calendar' | 'stats' | 'users' | 'targets'
            const [adminSelectedSalesman, setAdminSelectedSalesman] = useState("all"); // 'all', '管理者' or specific salesman name
            
            // Dynamic Salesman Add state
            const [newSalesmanName, setNewSalesmanName] = useState("");
            const [newSalesmanPassword, setNewSalesmanPassword] = useState("1234");
            const [toastMessage, setToastMessage] = useState("");

            // Daily Details Filter Query
            const [dailySearchQuery, setDailySearchQuery] = useState("");

            // Form Fields State
            const [formTitle, setFormTitle] = useState("");
            const [formCategory, setFormCategory] = useState("通路拜訪");
            const [formStartTime, setFormStartTime] = useState("09:00");
            const [formEndTime, setFormEndTime] = useState("10:00");
            const [formLocation, setFormLocation] = useState("");
            const [formCustomer, setFormCustomer] = useState("");
            const [formRemark, setFormRemark] = useState("");

            // Local editing buffer for actual sales target to prevent laggy server roundtrips
            const [inputSalesVal, setInputSalesVal] = useState("");

            // Derive salesmen name list from data
            const salesmen = useMemo(() => salesmenData.map(s => s.name), [salesmenData]);

            // Combined year and month option list for dropdown selection
            const mobileMonthOptions = useMemo(() => {
                const options = [];
                // 2026: 7 ~ 12
                for (let m = 7; m <= 12; m++) {
                    options.push({ year: 2026, month: m, label: `2026 年 ${m} 月` });
                }
                // 2027: 1 ~ 12
                for (let m = 1; m <= 12; m++) {
                    options.push({ year: 2027, month: m, label: `2027 年 ${m} 月` });
                }
                return options;
            }, []);

            useEffect(() => {
                const checkFirebase = () => {
                    if (window.firebaseInitialized) {
                        setFbReady(true);
                    } else {
                        setTimeout(checkFirebase, 100);
                    }
                };
                checkFirebase();
                window.addEventListener('firebase-ready', () => setFbReady(true));
                return () => window.removeEventListener('firebase-ready', () => {});
            }, []);

            useEffect(() => {
                if (!fbReady) return;

                const { signInAnonymously, signInWithCustomToken, onAuthStateChanged } = window.firebaseSDK;
                const auth = window.firebaseAuth;

                const runAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            try {
                                await signInWithCustomToken(auth, __initial_auth_token);
                            } catch (tokenErr) {
                                console.warn("Custom token failed, switching to anonymous...", tokenErr);
                                await signInAnonymously(auth);
                            }
                        } else {
                            await signInAnonymously(auth);
                        }
                    } catch (error) {
                        console.error("Firebase Auth Error:", error);
                        showToast("雲端連線失敗，請檢查網路狀態");
                    }
                };
                runAuth();

                const unsubscribeAuth = onAuthStateChanged(auth, (currentUser) => {
                    setUser(currentUser);
                });

                return () => {
                    unsubscribeAuth();
                };
            }, [fbReady]);

            useEffect(() => {
                if (!user) return;

                const { collection, query, onSnapshot, addDoc } = window.firebaseSDK;
                const db = window.firebaseDb;
                const appId = "leshine-car-calendar";

                // Subscribe to Salesmen list
                const salesmenCol = collection(db, 'artifacts', appId, 'public', 'data', 'salesmen');
                const unsubscribeSalesmen = onSnapshot(salesmenCol, (snapshot) => {
                    if (snapshot.empty) {
                        DEFAULT_SALESMEN.forEach(async (name) => {
                            await addDoc(salesmenCol, { 
                                name, 
                                password: "1234", // Default initialized password
                                createdAt: new Date().toISOString() 
                            });
                        });
                    } else {
                        const list = [];
                        snapshot.forEach((doc) => {
                            list.push({ id: doc.id, ...doc.data() });
                        });
                        list.sort((a, b) => (a.createdAt || '').localeCompare(b.createdAt || ''));
                        setSalesmenData(list);
                    }
                }, (error) => {
                    console.error("Salesmen Subscription Error:", error);
                });

                // Subscribe to Events list
                const eventsCol = collection(db, 'artifacts', appId, 'public', 'data', 'events');
                const unsubscribeEvents = onSnapshot(eventsCol, (snapshot) => {
                    const list = [];
                    snapshot.forEach((doc) => {
                        list.push({ id: doc.id, ...doc.data() });
                    });
                    setEvents(list);
                }, (error) => {
                    console.error("Events Subscription Error:", error);
                });

                // Subscribe to Monthly Targets list
                const targetsCol = collection(db, 'artifacts', appId, 'public', 'data', 'targets');
                const unsubscribeTargets = onSnapshot(targetsCol, (snapshot) => {
                    const dict = {};
                    snapshot.forEach((doc) => {
                        const data = doc.data();
                        const key = `${data.salesman}_${data.year}_${data.month}`;
                        dict[key] = { id: doc.id, target: Number(data.target || 0) };
                    });
                    setMonthlyTargets(dict);
                }, (error) => {
                    console.error("Targets Subscription Error:", error);
                });

                // Subscribe to Actual Sales list
                const salesCol = collection(db, 'artifacts', appId, 'public', 'data', 'actualSales');
                const unsubscribeSales = onSnapshot(salesCol, (snapshot) => {
                    const dict = {};
                    snapshot.forEach((doc) => {
                        const data = doc.data();
                        const key = `${data.salesman}_${data.year}_${data.month}`;
                        dict[key] = { id: doc.id, sales: Number(data.sales || 0) };
                    });
                    setActualSales(dict);
                }, (error) => {
                    console.error("Actual Sales Subscription Error:", error);
                });

                return () => {
                    unsubscribeSalesmen();
                    unsubscribeEvents();
                    unsubscribeTargets();
                    unsubscribeSales();
                };
            }, [user]);

            // Auto-adjust boundary months for 2026 & 2027
            useEffect(() => {
                if (selectedYear === 2026 && selectedMonth < 7) {
                    setSelectedMonth(7);
                }
            }, [selectedYear, selectedMonth]);

            // Auto-adjust date boundaries when changing month/year
            useEffect(() => {
                if (!selectedDate) return;
                const dayStr = selectedDate.split("-")[2] || "01";
                const newDate = `${selectedYear}-${String(selectedMonth).padStart(2, '0')}-${dayStr}`;
                setSelectedDate(newDate);
            }, [selectedYear, selectedMonth]);

            // Pull initial local buffer for user actual sales when months or user changes
            useEffect(() => {
                if (currentUser) {
                    const key = `${currentUser}_${selectedYear}_${selectedMonth}`;
                    const existingVal = actualSales[key]?.sales ?? 0;
                    setInputSalesVal(existingVal === 0 ? "" : String(existingVal));
                }
            }, [currentUser, selectedYear, selectedMonth, actualSales]);

            const showToast = (msg) => {
                setToastMessage(msg);
                setTimeout(() => setToastMessage(""), 3500);
            };

            // Unified Credential Login
            const handleCredentialLogin = (e) => {
                if (e) e.preventDefault();
                if (!loginUsername) {
                    showToast("請選擇您的帳號 (姓名)！");
                    return;
                }
                if (!loginPassword) {
                    showToast("請輸入密碼以進行認證！");
                    return;
                }

                if (loginUsername === "管理者") {
                    if (loginPassword === "admin123") {
                        setCurrentRole("admin");
                        setCurrentUser("管理者");
                        setAdminTab("calendar");
                        setAdminSelectedSalesman("all");
                        setLoginPassword("");
                        showToast("管理者身分驗證成功！歡迎登入系統");
                    } else {
                        showToast("密碼錯誤，請重新輸入。");
                    }
                } else {
                    const matchedUser = salesmenData.find(s => s.name === loginUsername);
                    if (matchedUser) {
                        const correctPassword = matchedUser.password || "1234";
                        if (loginPassword === correctPassword) {
                            setCurrentRole("salesman");
                            setCurrentUser(loginUsername);
                            setLoginPassword("");
                            showToast(`驗證成功，已登入業務員：${loginUsername}`);
                        } else {
                            showToast("密碼錯誤，請重新輸入。");
                        }
                    } else {
                        showToast("找不到此同仁帳號！");
                    }
                }
            };

            const handleLogout = () => {
                setCurrentRole(null);
                setCurrentUser(null);
                setAdminTab("calendar");
                setAdminSelectedSalesman("all");
                setLoginUsername("");
                setLoginPassword("");
                showToast("您已安全登出系統");
            };

            const handleAddNewSalesman = async (e) => {
                e.preventDefault();
                if (!newSalesmanName.trim()) return;
                
                if (salesmen.includes(newSalesmanName.trim())) {
                    showToast("此業務人員名稱已存在！");
                    return;
                }

                try {
                    const { collection, addDoc } = window.firebaseSDK;
                    const db = window.firebaseDb;
                    const appId = "leshine-car-calendar";
                    
                    const salesmenCol = collection(db, 'artifacts', appId, 'public', 'data', 'salesmen');
                    await addDoc(salesmenCol, { 
                        name: newSalesmanName.trim(), 
                        password: newSalesmanPassword.trim() || "1234",
                        createdAt: new Date().toISOString() 
                    });
                    
                    showToast(`成功新增同仁：${newSalesmanName}`);
                    setNewSalesmanName("");
                    setNewSalesmanPassword("1234");
                } catch (err) {
                    console.error("Error adding salesman:", err);
                    showToast("新增失敗，請檢查權限及網路。");
                }
            };

            // Update salesman password (Admin panel)
            const handleUpdateSalesmanPassword = async (salesmanId, newPassword) => {
                const { doc, updateDoc } = window.firebaseSDK;
                const db = window.firebaseDb;
                const appId = "leshine-car-calendar";

                if (!newPassword.trim()) {
                    showToast("密碼不可為空！");
                    return;
                }

                try {
                    const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'salesmen', salesmanId);
                    await updateDoc(docRef, { password: newPassword.trim() });
                    showToast("同仁密碼已變更成功！");
                } catch (error) {
                    console.error("Error updating password:", error);
                    showToast("密碼更新失敗，請確認網路連線。");
                }
            };

            // Set/Update single salesman monthly goal (Admin)
            const handleSaveMonthlyTarget = async (salesmanName, targetVal) => {
                const { collection, doc, addDoc, updateDoc } = window.firebaseSDK;
                const db = window.firebaseDb;
                const appId = "leshine-car-calendar";
                const key = `${salesmanName}_${selectedYear}_${selectedMonth}`;
                const exist = monthlyTargets[key];

                try {
                    if (exist) {
                        const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'targets', exist.id);
                        await updateDoc(docRef, { target: Number(targetVal) || 0, updatedAt: new Date().toISOString() });
                    } else {
                        const targetsCol = collection(db, 'artifacts', appId, 'public', 'data', 'targets');
                        await addDoc(targetsCol, {
                            salesman: salesmanName,
                            year: selectedYear,
                            month: selectedMonth,
                            target: Number(targetVal) || 0,
                            createdAt: new Date().toISOString()
                        });
                    }
                    showToast(`成功更新 ${salesmanName} 的目標！`);
                } catch (error) {
                    console.error("Save Target Error: ", error);
                    showToast("寫入目標資料失敗");
                }
            };

            // Save actual transactions (Salesperson / User)
            const handleSaveActualSales = async (e) => {
                if (e) e.preventDefault();
                if (!currentUser) return;

                const { collection, doc, addDoc, updateDoc } = window.firebaseSDK;
                const db = window.firebaseDb;
                const appId = "leshine-car-calendar";
                const key = `${currentUser}_${selectedYear}_${selectedMonth}`;
                const exist = actualSales[key];
                const numericVal = Number(inputSalesVal) || 0;

                try {
                    if (exist) {
                        const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'actualSales', exist.id);
                        await updateDoc(docRef, { sales: numericVal, updatedAt: new Date().toISOString() });
                    } else {
                        const salesCol = collection(db, 'artifacts', appId, 'public', 'data', 'actualSales');
                        await addDoc(salesCol, {
                            salesman: currentUser,
                            year: selectedYear,
                            month: selectedMonth,
                            sales: numericVal,
                            createdAt: new Date().toISOString()
                        });
                    }
                    showToast(`本月成交數成功登記為：${numericVal} 台`);
                } catch (error) {
                    console.error("Save Actual Sales Error: ", error);
                    showToast("雲端存檔失敗");
                }
            };

            const daysInMonth = useMemo(() => {
                return new Date(selectedYear, selectedMonth, 0).getDate();
            }, [selectedYear, selectedMonth]);

            const startDayOfWeek = useMemo(() => {
                return new Date(selectedYear, selectedMonth - 1, 1).getDay();
            }, [selectedYear, selectedMonth]);

            const filteredEvents = useMemo(() => {
                if (currentRole === 'admin') {
                    if (adminSelectedSalesman === 'all') {
                        return events;
                    } else {
                        return events.filter(e => e.salesman === adminSelectedSalesman);
                    }
                } else {
                    // Strict Salesperson Isolation: Salesmen can ONLY see and access their own events
                    return events.filter(e => e.salesman === currentUser);
                }
            }, [events, currentRole, currentUser, adminSelectedSalesman]);

            const stats = useMemo(() => {
                const counts = { "通路拜訪": 0, "客戶開發": 0, "報價紀錄": 0, "領牌": 0, "交車": 0, "客戶服務": 0 };
                const userCounts = {};
                const userCategoryCounts = {};
                
                const allUsers = [...salesmen, "管理者"];
                allUsers.forEach(name => {
                    userCounts[name] = 0;
                    userCategoryCounts[name] = { "通路拜訪": 0, "客戶開發": 0, "報價紀錄": 0, "領牌": 0, "交車": 0, "客戶服務": 0 };
                });

                filteredEvents.forEach(ev => {
                    if (counts[ev.category] !== undefined) {
                        counts[ev.category]++;
                    }
                    
                    if (ev.salesman) {
                        if (userCounts[ev.salesman] === undefined) {
                            userCounts[ev.salesman] = 0;
                        }
                        userCounts[ev.salesman]++;

                        if (userCategoryCounts[ev.salesman] === undefined) {
                            userCategoryCounts[ev.salesman] = { "通路拜訪": 0, "客戶開發": 0, "報價紀錄": 0, "領牌": 0, "交車": 0, "客戶服務": 0 };
                        }
                        if (userCategoryCounts[ev.salesman][ev.category] !== undefined) {
                            userCategoryCounts[ev.salesman][ev.category]++;
                        }
                    }
                });

                return { counts, userCounts, userCategoryCounts };
            }, [filteredEvents, salesmen]);

            // Single / Collective goals computation based on selected calendar mode
            const activeTargetMetrics = useMemo(() => {
                let target = 0;
                let sales = 0;

                if (currentRole === 'admin') {
                    if (adminSelectedSalesman === 'all') {
                        salesmen.forEach(name => {
                            const key = `${name}_${selectedYear}_${selectedMonth}`;
                            target += monthlyTargets[key]?.target || 0;
                            sales += actualSales[key]?.sales || 0;
                        });
                    } else {
                        const key = `${adminSelectedSalesman}_${selectedYear}_${selectedMonth}`;
                        target = monthlyTargets[key]?.target || 0;
                        sales = actualSales[key]?.sales || 0;
                    }
                } else if (currentUser) {
                    const key = `${currentUser}_${selectedYear}_${selectedMonth}`;
                    target = monthlyTargets[key]?.target || 0;
                    sales = actualSales[key]?.sales || 0;
                }
                
                const percentage = target > 0 ? Math.round((sales / target) * 100) : 0;
                return { target, sales, rate: percentage };
            }, [currentRole, currentUser, adminSelectedSalesman, salesmen, selectedYear, selectedMonth, monthlyTargets, actualSales]);

            const getDayOfWeekName = (dateStr) => {
                if (!dateStr) return "";
                const days = ["星期日", "星期一", "星期二", "星期三", "星期四", "星期五", "星期六"];
                const d = new Date(dateStr);
                return days[d.getDay()];
            };

            const formatDisplayDate = (dateStr) => {
                if (!dateStr) return "";
                return dateStr.replace(/-/g, "/");
            };

            const dailyEvents = useMemo(() => {
                const matchedEvents = filteredEvents.filter(ev => ev.date === selectedDate);
                if (!dailySearchQuery.trim()) return matchedEvents;
                
                const queryClean = dailySearchQuery.toLowerCase().trim();
                return matchedEvents.filter(ev => 
                    (ev.title && ev.title.toLowerCase().includes(queryClean)) ||
                    (ev.location && ev.location.toLowerCase().includes(queryClean)) ||
                    (ev.customer && ev.customer.toLowerCase().includes(queryClean)) ||
                    (ev.remark && ev.remark.toLowerCase().includes(queryClean))
                );
            }, [filteredEvents, selectedDate, dailySearchQuery]);

            const openAddModal = (dateStr) => {
                if (!currentUser) {
                    showToast("請先點選您的使用者名稱以進行登入登記！");
                    return;
                }

                    customer: formCustomer,

                const headers = ["日期", "業務員", "行程名稱", "開始時間", "結束時間", "行程類別", "出差地點", "客戶名稱/同業通路", "備註"];
                const sortedEvents = [...events].sort((a, b) => a.date.localeCompare(b.date) || a.startTime.localeCompare(b.startTime));
                
                const rows = sortedEvents.map(ev => [
                    ev.date,
                    ev.salesman || "",
                    ev.title || "",
                    ev.startTime || "",
                    ev.endTime || "",
                    ev.category || "",
                    ev.location || "",
                    ev.customer || "",
                    ev.remark || ""
                ]);

                let csvContent = "\uFEFF";
                csvContent += headers.join(",") + "\r\n";
                
                rows.forEach(row => {
                    const cleanRow = row.map(val => {
                        const escaped = String(val).replace(/"/g, '""');
                        return `"${escaped}"`;
                    });
                    csvContent += cleanRow.join(",") + "\r\n";

                link.setAttribute("href", url);
                link.setAttribute("download", `格上租車_北一部二課_全體業務日程表_${selectedYear}年.csv`);

                    return;
                }

                const escapeICS = (str) => {
                    if (!str) return "";
                    return String(str)
                        .replace(/\\/g, "\\\\")
                        .replace(/;/g, "\\;")
                        .replace(/,/g, "\\,")
                        .replace(/\n/g, "\\n")
                        .replace(/\r/g, "");

                    "BEGIN:VCALENDAR",
                    "VERSION:2.0",
                    "PRODID:-//Leshine Car//Calendar App//ZH",
                    "CALSCALE:GREGORIAN",
                    "METHOD:PUBLISH"
                ];

                targetEvents.forEach(ev => {
                    const dateClean = ev.date.replace(/-/g, ""); 
                    const startClean = (ev.startTime || "00:00").replace(/:/g, "") + "00"; 
                    const endClean = (ev.endTime || "23:59").replace(/:/g, "") + "00"; 

                    const dtStart = `DTSTART;TZID=Asia/Taipei:${dateClean}T${startClean}`;
                    const dtEnd = `DTEND;TZID=Asia/Taipei:${dateClean}T${endClean}`;
                    const dtStamp = new Date().toISOString().replace(/[-:]/g, "").split(".")[0] + "Z";

                    const summary = escapeICS(`[${ev.category}] ${ev.title}`);
                    const description = escapeICS(`業務員: ${ev.salesman || ""}\n客戶/同業: ${ev.customer || ""}\n備註: ${ev.remark || ""}`);
                    const location = escapeICS(ev.location || "");
                    const uid = `${ev.id || Math.random().toString(36).substring(2)}@leshine-car-calendar`;

                    icsContent.push("BEGIN:VEVENT");
                    icsContent.push(`UID:${uid}`);
                    icsContent.push(`DTSTAMP:${dtStamp}`);
                    icsContent.push(dtStart);
                    icsContent.push(dtEnd);
                    icsContent.push(`SUMMARY:${summary}`);
                    icsContent.push(`DESCRIPTION:${description}`);
                    if (location) {
                        icsContent.push(`LOCATION:${location}`);
                    }
                    icsContent.push("END:VEVENT");
                });

                icsContent.push("END:VCALENDAR");

                const icsString = icsContent.join("\r\n");

                                                onChange={(e) => setNewSalesmanName(e.target.value)}
                                                placeholder="請輸入姓名 (例如: 陳大明)"
                                                class="w-full bg-white border border-slate-200 text-sm px-3 py-2 rounded-lg focus:outline-none focus:ring-2 focus:ring-leshineBlue/20"
                                            />
                                        </div>
                                        <div>
                                            <label class="block text-xs sm:text-sm font-bold text-slate-500 mb-1">初始密碼</label>
                                            <input 
                                                type="text" 
                                                value={newSalesmanPassword}
                                                onChange={(e) => setNewSalesmanPassword(e.target.value)}
                                                placeholder="預設為 1234"
                                                class="w-full bg-white border border-slate-200 text-sm px-3 py-2 rounded-lg focus:outline-none focus:ring-2 focus:ring-leshineBlue/20"
                                            />
                                        </div>
                                        <button 
                                            type="submit"
                                            class="bg-leshineOrange hover:bg-orange-600 text-white font-bold text-sm py-2 px-5 rounded-lg transition shadow-md"
                                        >
                                            確認新增
                                        </button>
                                    </form>

                                    <div class="border border-slate-100 rounded-xl overflow-hidden">
                                        <table class="w-full text-left border-collapse">
                                            <thead>
                                                <tr class="bg-slate-50 text-xs sm:text-sm font-bold text-slate-500 border-b border-slate-100">
                                                    <th class="p-4">業務同仁姓名</th>
                                                    <th class="p-4 text-center">登入密碼 (可直接修改)</th>
                                                    <th class="p-4 text-center">已登記行程次數</th>
                                                    <th class="p-4 text-center">密碼重設操作</th>
                                                </tr>
                                            </thead>
                                            <tbody class="divide-y divide-slate-100 text-sm sm:text-base text-slate-700">
                                                {salesmenData.map((s) => (
                                                    <tr key={s.id} class="hover:bg-slate-50/50">
                                                        <td class="p-4 font-semibold">{s.name}</td>
                                                        <td class="p-4 text-center">
                                                            <input 
                                                                type="text"
                                                                defaultValue={s.password || "1234"}
                                                                id={`pwd_input_${s.id}`}
                                                                class="bg-slate-50 border border-slate-200 text-sm px-3 py-1 rounded-lg w-32 text-center font-mono focus:outline-none focus:ring-1 focus:ring-leshineBlue"
                                                            />
                                                        </td>
                                                        <td class="p-4 text-center font-bold text-slate-900">{stats.userCounts[s.name] || 0} 次</td>
                                                        <td class="p-4 text-center">
                                                            <button
                                                                onClick={() => {
                                                                    const val = document.getElementById(`pwd_input_${s.id}`).value;
                                                                    handleUpdateSalesmanPassword(s.id, val);
                                                                }}
                                                                class="bg-leshineBlue hover:bg-leshineNavy text-white font-bold text-xs py-1.5 px-3.5 rounded-lg transition"
                                                            >
                                                                變更密碼
                                                            </button>
                                                        </td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            ) : (
                                /* Main Workspace Render: Calendar view */
                                <div class="w-full">
                                    {/* A. COMPUTER DESKTOP ONLY VIEW (lg:grid hidden lg:grid) */}
                                    <div class="hidden lg:grid grid-cols-12 gap-6 items-start">
                                        {/* Left Side: Calendar column (Mainly expanded to 8 cols for bigger matrix views) */}
                                        <div class="col-span-8 flex flex-col space-y-4">
                                            {/* 1. 行事曆切換 (Merged dropdown on top of grid) */}
                                            {renderCalendarSwitch(false)}

                                            {/* 2. 行程類別標籤 (Horizontal row at calendar switch bottom) */}
                                            {renderLegendLabels()}

                                            {/* 3. 行事曆檢視 (Zoomed calendar display box) */}
                                            {renderCalendarMatrix()}
                                        </div>

                                        {/* Right Side: Info column (Holds Daily Schedule Details, Targets, and Personal utilities) */}
                                        <div class="col-span-4 flex flex-col space-y-6">
                                            {/* 1. 當日行程詳情 */}
                                            {renderDailyDetails()}

                                            {/* 2. 本月目標與進度 (Shifted below daily details) */}
                                            {renderGoalsAndProgress()}

                                            {/* 3. 個人工具 (Shifted below target progress cards) */}
                                            {renderToolsAndPanels()}

                                            {/* 4. 管理者專用 ICS/CSV 數據匯出區 (Shifted below personal utilities) */}
                                            {renderAdminExports()}
                                        </div>
                                    </div>

                                    {/* B. MOBILE PORTRAIT / LANDSCAPE ONLY VIEW (lg:hidden flex flex-col) */}
                                    {/* Fully structured with exact requested sequence: */}
                                    {/* 1. 行事曆切換 (Switch) --> 2. 行程類別標籤 (Labels, Row) --> 3. 行事曆檢視 (Matrix) */}
                                    {/* --> 4. 當日行程詳情 (Details) --> 5. 本月目標與進度 (Goals) --> 6. 個人工具 / 管理專區 (Tools) */}
                                    <div class="lg:hidden flex flex-col space-y-6">
                                        {/* 1. 行事曆切換 */}
                                        <div class="order-1">
                                            {renderCalendarSwitch(true)}
                                        </div>

                                        {/* 2. 行程類別標籤 (Row display) */}
                                        <div class="order-2">
                                            {renderLegendLabels()}
                                        </div>

                                        {/* 3. 行事曆檢視 (Hide Weekends, Mon-Fri display) */}
                                        <div class="order-3">
                                            {renderCalendarMatrix()}
                                        </div>

                                        {/* 4. 當日行程詳情 (Details & Auto highlights) */}
                                        <div class="order-4">
                                            {renderDailyDetails()}
                                        </div>

                                        {/* 5. 本月目標與進度 */}
                                        <div class="order-5">
                                            {renderGoalsAndProgress()}
                                        </div>

                                        {/* 6. 個人工具 */}
                                        <div class="order-6 space-y-6">
                                            {renderToolsAndPanels()}
                                            {renderAdminExports()}
                                        </div>
                                    </div>
                                </div>
                            )}
                        </main>
                    )}

                    <footer class="bg-white border-t border-slate-200 text-slate-400 py-6 text-center text-xs sm:text-sm mt-auto">
                        <p>© 2026 格上租車 北一部二課 - 業務日程管理系統 v2.2 (已啟用 Firebase Realtime 雲端數據儲存 與 Google Analytics 數據追蹤)</p>
                    </footer>

                    {/* MODAL WINDOWS */}
                    {isModalOpen && (
                        <div class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4 z-50 animate-fade-in">
                            <div class="bg-white rounded-3xl shadow-2xl max-w-lg w-full overflow-hidden border border-slate-100 flex flex-col max-h-[90vh]">
                                <div class="bg-leshineBlue text-white px-6 py-4 flex items-center justify-between">
                                    <div class="flex items-center space-x-2">
                                        <span class="text-xl">📅</span>
                                        <div>
                                            <h3 class="font-black text-md sm:text-lg">
                                                {editingEvent ? "修改行程內容" : "登記每日業務行程"}
                                            </h3>
                                            <p class="text-xs sm:text-sm text-blue-100">{selectedDate} (已登入：{editingEvent ? editingEvent.salesman : currentUser})</p>
                                        </div>
                                    </div>
                                    <button 
                                        onClick={() => setIsModalOpen(false)}
                                        class="text-white/80 hover:text-white font-bold text-lg"
                                    >
                                        ✕
                                    </button>
                                </div>

                                <form onSubmit={handleSaveEvent} class="p-6 space-y-4 overflow-y-auto flex-grow text-sm sm:text-base">
                                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        <div class="col-span-2">
                                            <label class="block text-xs sm:text-sm font-bold text-slate-500 mb-1">行程名稱 <span class="text-rose-500">*</span></label>
                                            <input 
                                                type="text" 
                                                value={formTitle}
                                                onChange={(e) => setFormTitle(e.target.value)}
                                                placeholder="請輸入行程主軸 (例如: 拜訪信義經銷商)"
                                                class="w-full bg-slate-50 border border-slate-200 text-sm sm:text-base px-3 py-2 rounded-lg focus:outline-none focus:ring-2 focus:ring-leshineBlue/20 font-medium"
                                                required
                                            />
                                        </div>

                                        <div>
                                            <label class="block text-xs sm:text-sm font-bold text-slate-500 mb-1">行程類別</label>
                                            <select 
                                                value={formCategory}
                                                onChange={(e) => setFormCategory(e.target.value)}
                                                class="w-full bg-slate-50 border border-slate-200 text-sm sm:text-base px-3 py-2 rounded-lg focus:outline-none focus:ring-2 focus:ring-leshineBlue/20"
                                            >
                                                {Object.keys(CATEGORY_COLORS).map(cat => (
                                                    <option key={cat} value={cat}>{cat}</option>
                                                ))}
                                            </select>
                                        </div>

                                        <div>
                                            <label class="block text-xs sm:text-sm font-bold text-slate-500 mb-1">出差地點</label>
                                            <input 
                                                type="text" 
                                                value={formLocation}
                                                onChange={(e) => setFormLocation(e.target.value)}
                                                placeholder="例如: 台北市信義區"
                                                class="w-full bg-slate-50 border border-slate-200 text-sm sm:text-base px-3 py-2 rounded-lg focus:outline-none focus:ring-2 focus:ring-leshineBlue/20"
                                            />
                                        </div>

                                        <div>
                                            <label class="block text-xs sm:text-sm font-bold text-slate-500 mb-1">開始時間</label>
                                            <input 
                                                type="time" 
                                                value={formStartTime}
                                                onChange={(e) => setFormStartTime(e.target.value)}
                                                class="w-full bg-slate-50 border border-slate-200 text-sm sm:text-base px-3 py-2 rounded-lg focus:outline-none focus:ring-2 focus:ring-leshineBlue/20"
                                            />
                                        </div>

                                        <div>
                                            <label class="block text-xs sm:text-sm font-bold text-slate-500 mb-1">結束時間</label>
                                            <input 
                                                type="time" 
                                                value={formEndTime}
                                                onChange={(e) => setFormEndTime(e.target.value)}
                                                class="w-full bg-slate-50 border border-slate-200 text-sm sm:text-base px-3 py-2 rounded-lg focus:outline-none focus:ring-2 focus:ring-leshineBlue/20"
                                            />
                                        </div>

                                        <div class="col-span-2">
                                            <label class="block text-xs sm:text-sm font-bold text-slate-500 mb-1">客戶名稱 / 同業通路</label>
                                            <input 
                                                type="text" 
                                                value={formCustomer}
                                                onChange={(e) => setFormCustomer(e.target.value)}
                                                placeholder="請輸入對接客戶或通路名稱"
                                                class="w-full bg-slate-50 border border-slate-200 text-sm sm:text-base px-3 py-2 rounded-lg focus:outline-none focus:ring-2 focus:ring-leshineBlue/20 font-medium"
                                            />
                                        </div>

                                        <div class="col-span-2">
                                            <label class="block text-xs sm:text-sm font-bold text-slate-500 mb-1">備註資訊</label>
                                            <textarea 
                                                value={formRemark}
                                                onChange={(e) => setFormRemark(e.target.value)}
                                                placeholder="補充其他詳細備忘細節..."
                                                rows="3"
                                                class="w-full bg-slate-50 border border-slate-200 text-sm sm:text-base px-3 py-2 rounded-lg focus:outline-none focus:ring-2 focus:ring-leshineBlue/20 font-medium"
                                            ></textarea>
                                        </div>
                                    </div>

                                    <div class="flex items-center justify-between pt-4 border-t border-slate-100">
                                        <div>
                                            {editingEvent && (
                                                <button
                                                    type="button"
                                                    onClick={triggerDeleteConfirmation}
                                                    class="bg-rose-50 text-rose-600 hover:bg-rose-100 border border-rose-200 font-bold text-xs sm:text-sm py-2 px-4 rounded-xl transition"
                                                >
                                                    刪除行程
                                                </button>
                                            )}
                                        </div>
                                        <div class="flex items-center space-x-2">
                                            <button
                                                type="button"
                                                onClick={() => setIsModalOpen(false)}
                                                class="bg-slate-100 hover:bg-slate-200 text-slate-600 font-bold text-xs sm:text-sm py-2 px-4 rounded-xl transition"
                                            >
                                                取消
                                            </button>
                                            <button
                                                type="submit"
                                                class="bg-leshineOrange hover:bg-orange-600 text-white font-bold text-xs sm:text-sm py-2 px-5 rounded-xl shadow transition"
                                            >
                                                儲存行程
                                            </button>
                                        </div>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    {isDeleteConfirmOpen && (
                        <div class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4 z-[60]">
                            <div class="bg-white rounded-3xl shadow-2xl max-w-sm w-full overflow-hidden border border-slate-100 p-6 text-sm sm:text-base">
                                <h3 class="text-lg font-black text-slate-800 mb-2">確認刪除行程</h3>
                                <p class="text-xs sm:text-sm text-slate-500 mb-6">您確認要永久刪除「{editingEvent?.title}」這項日程登記嗎？此操作將無法還原。</p>
                                <div class="flex justify-end space-x-2">
                                    <button
                                        onClick={() => setIsDeleteConfirmOpen(false)}
                                        class="bg-slate-100 hover:bg-slate-200 text-slate-600 font-bold text-xs sm:text-sm py-2 px-4 rounded-xl transition"
                                    >
                                        取消
                                    </button>
                                    <button
                                        onClick={confirmDeleteEvent}
                                        class="bg-rose-600 hover:bg-rose-700 text-white font-bold text-xs sm:text-sm py-2 px-5 rounded-xl shadow transition"
                                    >
                                        確定刪除
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
